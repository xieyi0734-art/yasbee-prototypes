<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — YASBee</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#E59303;--gold-light:rgba(229,147,3,0.08);--gold-mid:rgba(229,147,3,0.15);--bg:#f8f9fb;--text:#1a1a2e;--text-muted:#5b5b70;--text-light:#9090a8;--border:#e8e8f0;--card-bg:#ffffff;--radius:12px;--font:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;--input-h:48px}
@media(prefers-color-scheme:dark){:root{--bg:#0a0a18;--text:#e8e8f0;--text-muted:#9090a8;--text-light:#6a6a80;--border:#1e1e32;--card-bg:#12122a}}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased}
.auth-wrap{width:420px;max-width:100%}
.auth-box{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:36px 32px 28px}
.logo{text-align:center;margin-bottom:28px}
.logo a{font-size:22px;font-weight:700;letter-spacing:-0.3px;color:var(--text);text-decoration:none}
.logo a span{color:var(--gold)}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:24px}
.tab{flex:1;text-align:center;padding:12px 0;font-size:14px;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font)}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--text-muted);margin-bottom:5px}
.form-group input{width:100%;height:var(--input-h);padding:0 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--card-bg);color:var(--text);outline:none;transition:border .15s,box-shadow .15s;font-family:var(--font)}
.form-group input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-light)}
.form-group input.error{border-color:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,0.08)}
.form-group .field-hint{font-size:11px;color:var(--text-light);margin-top:4px}
.form-row{display:flex;gap:12px}
.form-row .form-group{flex:1}
.pwd-wrap{position:relative}
.pwd-wrap input{padding-right:44px}
.pwd-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-light);padding:4px;font-size:14px}
.pwd-toggle:hover{color:var(--text)}
/* Slider Captcha */
.slider-captcha{background:var(--badge-bg);border-radius:8px;padding:6px;margin-bottom:16px;position:relative}
:root{--badge-bg:#f3f4f6}@media(prefers-color-scheme:dark){:root{--badge-bg:#1a1a30}}
.slider-track{height:40px;background:var(--badge-bg);border-radius:6px;position:relative;overflow:hidden;user-select:none}
.slider-progress{height:100%;background:linear-gradient(90deg,#d1fae5,#059669);border-radius:6px;width:0;transition:width .1s linear;position:absolute;left:0;top:0}
.slider-thumb{position:absolute;left:0;top:0;width:44px;height:40px;border-radius:6px;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;cursor:grab;z-index:2;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,0.15);transition:box-shadow .15s}
.slider-thumb:active{cursor:grabbing;box-shadow:0 2px 10px rgba(229,147,3,0.4)}
.slider-thumb.verified{background:#059669;cursor:default}
.slider-hint{position:absolute;left:0;top:0;width:100%;height:40px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text-light);z-index:1;pointer-events:none}
.slider-hint.verified{color:#059669;font-weight:500}
.btn{width:100%;height:var(--input-h);border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:8px}
.btn-gold{background:var(--gold);color:#fff}
.btn-gold:hover{opacity:0.9}
.btn-gold:disabled{opacity:0.5;cursor:not-allowed}
.footer-text{text-align:center;font-size:13px;color:var(--text-muted);margin-top:16px}
.footer-text a{color:var(--gold);text-decoration:none;font-weight:500;cursor:pointer}
.footer-text a:hover{text-decoration:underline}
.terms-text{text-align:center;font-size:11px;color:var(--text-light);margin-top:14px;line-height:1.6}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text-light);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.social-btns{display:flex;gap:10px}
.social-btn{flex:1;height:44px;border:1px solid var(--border);border-radius:8px;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;color:var(--text-muted);transition:all .15s;font-family:var(--font)}
.social-btn:hover{background:var(--gold-light);border-color:var(--gold);color:var(--text)}
.forgot-link{text-align:right;margin-top:-8px;margin-bottom:16px}
.forgot-link a{font-size:12px;color:var(--text-light);text-decoration:none;cursor:pointer}
.forgot-link a:hover{color:var(--gold)}
.success-check{display:inline-block;animation:pop .3s ease}
@keyframes pop{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.hidden{display:none}
</style>
</head>
<body>
<div class="auth-wrap">
<div class="auth-box">
<div class="logo"><a href="#">YAS<span>Bee</span></a></div>

<div class="tabs">
<button class="tab active" data-tab="login" onclick="switchTab('login')">Sign In</button>
<button class="tab" data-tab="register" onclick="switchTab('register')">Sign Up</button>
</div>

<!-- Login Form -->
<div id="formLogin">
  <div class="form-group">
    <label>Email</label>
    <input type="email" placeholder="Enter your email" id="loginEmail">
  </div>
  <div class="form-group">
    <label>Password</label>
    <div class="pwd-wrap">
      <input type="password" placeholder="Enter your password" id="loginPwd">
      <button class="pwd-toggle" onclick="togglePwd('loginPwd',this)">👁</button>
    </div>
  </div>
  <div class="forgot-link"><a onclick="showToast('Reset link sent to your email')">Forgot password?</a></div>

  <!-- Slider Captcha -->
  <div class="slider-captcha" id="loginCaptcha">
    <div class="slider-track" id="loginSliderTrack">
      <div class="slider-progress" id="loginSliderProgress"></div>
      <div class="slider-hint" id="loginSliderHint">Slide to verify</div>
      <div class="slider-thumb" id="loginSliderThumb">→</div>
    </div>
  </div>

  <button class="btn btn-gold" id="loginBtn" disabled>Sign In</button>
</div>

<!-- Register Form -->
<div id="formRegister" class="hidden">
  <div class="form-row">
    <div class="form-group">
      <label>First Name</label>
      <input type="text" placeholder="John" id="regFirst">
    </div>
    <div class="form-group">
      <label>Last Name</label>
      <input type="text" placeholder="Doe" id="regLast">
    </div>
  </div>
  <div class="form-group">
    <label>Email</label>
    <input type="email" placeholder="Enter your email" id="regEmail">
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>Password</label>
      <div class="pwd-wrap">
        <input type="password" placeholder="Create password" id="regPwd">
        <button class="pwd-toggle" onclick="togglePwd('regPwd',this)">👁</button>
      </div>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <div class="pwd-wrap">
        <input type="password" placeholder="Confirm password" id="regPwdConfirm">
        <button class="pwd-toggle" onclick="togglePwd('regPwdConfirm',this)">👁</button>
      </div>
    </div>
  </div>
  <div class="form-group">
    <label>Phone (optional)</label>
    <input type="tel" placeholder="+1 (555) 123-4567" id="regPhone">
  </div>

  <!-- Slider Captcha -->
  <div class="slider-captcha" id="regCaptcha">
    <div class="slider-track" id="regSliderTrack">
      <div class="slider-progress" id="regSliderProgress"></div>
      <div class="slider-hint" id="regSliderHint">Slide to verify</div>
      <div class="slider-thumb" id="regSliderThumb">→</div>
    </div>
  </div>

  <button class="btn btn-gold" id="regBtn" disabled>Create Account</button>

  <div class="terms-text">
    By creating an account, you agree to our<br>
    <a href="#">Terms of Service</a> &amp; <a href="#">Privacy Policy</a>
  </div>
</div>

<div class="divider">or continue with</div>
<div class="social-btns">
  <button class="social-btn" onclick="showToast('Google SSO')"><span>G</span> Google</button>
  <button class="social-btn" onclick="showToast('Apple SSO')"><span></span> Apple</button>
</div>
</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<style>
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;z-index:2000;opacity:0;transition:opacity .3s;box-shadow:0 4px 20px rgba(0,0,0,0.2);pointer-events:none}
.toast.show{opacity:1}
</style>

<script>
/* ——— Slider Captcha Engine ——— */
function initSlider(trackId, thumbId, progressId, hintId, onVerified){
  var track = document.getElementById(trackId);
  var thumb = document.getElementById(thumbId);
  var progress = document.getElementById(progressId);
  var hint = document.getElementById(hintId);
  var isDragging = false;
  var startX = 0;
  var thumbLeft = 0;
  var verified = false;

  function reset(){
    verified = false;
    isDragging = false;
    thumb.style.left = '0px';
    progress.style.width = '0px';
    hint.textContent = 'Slide to verify';
    hint.className = 'slider-hint';
    thumb.className = 'slider-thumb';
    thumb.style.cursor = 'grab';
    onVerified(false);
  }

  thumb.addEventListener('mousedown', function(e){
    if(verified) return;
    isDragging = true;
    startX = e.clientX;
    thumbLeft = parseInt(thumb.style.left) || 0;
    thumb.style.cursor = 'grabbing';
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e){
    if(!isDragging) return;
    var maxLeft = track.offsetWidth - thumb.offsetWidth;
    var dx = e.clientX - startX;
    var newLeft = Math.max(0, Math.min(maxLeft, thumbLeft + dx));
    var pct = (newLeft / maxLeft) * 100;
    thumb.style.left = newLeft + 'px';
    progress.style.width = pct + '%';

    // Auto-verify at ~92%
    if(newLeft >= maxLeft * 0.92 && !verified){
      verified = true;
      isDragging = false;
      thumb.style.left = maxLeft + 'px';
      progress.style.width = '100%';
      hint.textContent = '✓ Verified';
      hint.className = 'slider-hint verified';
      thumb.className = 'slider-thumb verified';
      thumb.style.cursor = 'default';
      onVerified(true);
    }
  });

  document.addEventListener('mouseup', function(){
    if(!isDragging) return;
    isDragging = false;
    if(!verified){
      reset();
    }
  });

  // Touch support
  thumb.addEventListener('touchstart', function(e){
    if(verified) return;
    isDragging = true;
    startX = e.touches[0].clientX;
    thumbLeft = parseInt(thumb.style.left) || 0;
    thumb.style.cursor = 'grabbing';
    e.preventDefault();
  }, {passive:false});

  document.addEventListener('touchmove', function(e){
    if(!isDragging) return;
    var maxLeft = track.offsetWidth - thumb.offsetWidth;
    var dx = e.touches[0].clientX - startX;
    var newLeft = Math.max(0, Math.min(maxLeft, thumbLeft + dx));
    var pct = (newLeft / maxLeft) * 100;
    thumb.style.left = newLeft + 'px';
    progress.style.width = pct + '%';

    if(newLeft >= maxLeft * 0.92 && !verified){
      verified = true;
      isDragging = false;
      thumb.style.left = maxLeft + 'px';
      progress.style.width = '100%';
      hint.textContent = '✓ Verified';
      hint.className = 'slider-hint verified';
      thumb.className = 'slider-thumb verified';
      thumb.style.cursor = 'default';
      onVerified(true);
    }
  }, {passive:false});

  document.addEventListener('touchend', function(){
    if(!isDragging) return;
    isDragging = false;
    if(!verified){
      reset();
    }
  });

  return {reset: reset};
}

/* ——— Init both sliders ——— */
var loginVerified = false;
var regVerified = false;

var loginSlider = initSlider(
  'loginSliderTrack','loginSliderThumb','loginSliderProgress','loginSliderHint',
  function(v){ loginVerified = v; updateLoginBtn(); }
);

var regSlider = initSlider(
  'regSliderTrack','regSliderThumb','regSliderProgress','regSliderHint',
  function(v){ regVerified = v; updateRegBtn(); }
);

function updateLoginBtn(){
  document.getElementById('loginBtn').disabled = !loginVerified;
}

function updateRegBtn(){
  document.getElementById('regBtn').disabled = !regVerified;
}

/* ——— Tab switching ——— */
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(function(t){
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  document.getElementById('formLogin').classList.toggle('hidden', tab !== 'login');
  document.getElementById('formRegister').classList.toggle('hidden', tab !== 'register');
}

/* ——— Password toggle ——— */
function togglePwd(inputId, btn){
  var inp = document.getElementById(inputId);
  if(inp.type === 'password'){
    inp.type = 'text';
    btn.textContent = '🙈';
  } else {
    inp.type = 'password';
    btn.textContent = '👁';
  }
}

/* ——— Submit ——— */
document.getElementById('loginBtn').addEventListener('click', function(){
  var email = document.getElementById('loginEmail').value.trim();
  var pwd = document.getElementById('loginPwd').value;
  if(!email || !pwd){
    showToast('Please fill in all fields');
    return;
  }
  showToast('✓ Signed in successfully');
});

document.getElementById('regBtn').addEventListener('click', function(){
  var first = document.getElementById('regFirst').value.trim();
  var last = document.getElementById('regLast').value.trim();
  var email = document.getElementById('regEmail').value.trim();
  var pwd = document.getElementById('regPwd').value;
  var confirm = document.getElementById('regPwdConfirm').value;
  if(!first || !last || !email || !pwd || !confirm){
    showToast('Please fill in all required fields');
    return;
  }
  if(pwd !== confirm){
    showToast('Passwords do not match');
    return;
  }
  showToast('✓ Account created successfully');
});

/* ——— Toast ——— */
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')}, 2000);
}

/* ——— Enter key support ——— */
document.addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    var loginHidden = document.getElementById('formLogin').classList.contains('hidden');
    if(!loginHidden && loginVerified){
      document.getElementById('loginBtn').click();
    } else {
      var regHidden = document.getElementById('formRegister').classList.contains('hidden');
      if(!regHidden && regVerified){
        document.getElementById('regBtn').click();
      }
    }
  }
});
</script>
</body>
</html>
