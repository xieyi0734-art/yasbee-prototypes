<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statement — YASBee</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#E59303;--gold-light:rgba(229,147,3,0.08);--gold-mid:rgba(229,147,3,0.15);--bg:#f8f9fb;--sidebar-bg:#ffffff;--text:#1a1a2e;--text-muted:#5b5b70;--text-light:#9090a8;--border:#e8e8f0;--card-bg:#ffffff;--badge-bg:#f3f4f6;--radius:10px;--font:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif}
@media(prefers-color-scheme:dark){:root{--bg:#0a0a18;--sidebar-bg:#0f0f22;--text:#e8e8f0;--text-muted:#9090a8;--text-light:#6a6a80;--border:#1e1e32;--card-bg:#12122a;--badge-bg:#1a1a30}}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
.app{display:flex;min-height:100vh}
/* Sidebar */
.sidebar{width:240px;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-header{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.sidebar-header .logo{font-size:20px;font-weight:700;letter-spacing:-0.3px;color:var(--text);text-decoration:none}
.sidebar-header .logo span{color:var(--gold)}
.sidebar-nav{padding:12px 10px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;font-size:14px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all .15s;text-decoration:none;margin-bottom:2px}
.nav-item:hover{background:var(--gold-light);color:var(--text)}
.nav-item.active{background:var(--gold-mid);color:var(--gold);font-weight:600}
.nav-item .nav-icon{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border);font-size:13px;color:var(--text-light)}
/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:60px;background:var(--card-bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-left h1{font-size:20px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:16px}
.notif-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted);transition:all .15s}
.notif-btn:hover{background:var(--gold-light);color:var(--gold)}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px}
.content{padding:24px 28px;flex:1;overflow-y:auto}
/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.stat-card .stat-label{font-size:13px;color:var(--text-light);margin-bottom:4px}
.stat-card .stat-value{font-size:26px;font-weight:700;letter-spacing:-0.5px}
.stat-card .stat-sub{font-size:12px;color:var(--text-muted);margin-top:2px}
.stat-card .stat-value .currency{font-size:16px;font-weight:500;color:var(--text-muted)}
/* Tabs */
.tab-bar{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border)}
.tab-btn{padding:12px 24px;font-size:14px;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font)}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-btn .tab-badge{display:inline-block;padding:1px 8px;border-radius:10px;font-size:11px;background:var(--badge-bg);color:var(--text-muted);margin-left:6px;font-weight:400}
.tab-btn.active .tab-badge{background:var(--gold-mid);color:var(--gold)}
/* Filters */
.filter-bar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.filter-group{display:flex;align-items:center;gap:6px}
.filter-group label{font-size:13px;color:var(--text-muted);white-space:nowrap}
.filter-input,.filter-select{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--card-bg);color:var(--text);outline:none;transition:border .15s;font-family:var(--font)}
.filter-input:focus,.filter-select:focus{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold-light)}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-light)}
.search-wrap input{width:100%;padding:8px 12px 8px 36px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--card-bg);color:var(--text);outline:none;transition:border .15s}
.search-wrap input:focus{border-color:var(--gold)}
.spacer{flex:1}
.btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;font-family:var(--font)}
.btn-gold{background:var(--gold);color:#fff;border:1px solid var(--gold)}
.btn-gold:hover{opacity:0.9}
.btn-outline{background:transparent;color:var(--text-muted);border:1px solid var(--border)}
.btn-outline:hover{background:var(--gold-light);border-color:var(--gold);color:var(--text)}
/* Table */
.table-wrap{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:var(--badge-bg)}
th{padding:11px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:0.3px;white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:12px 16px;border-bottom:1px solid var(--border);white-space:nowrap;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--gold-light)}
.tx-id{font-family:'SF Mono','Cascadia Code','Consolas',monospace;font-size:12px;color:#2563eb;cursor:pointer}
.amount{font-weight:600;font-family:'SF Mono','Cascadia Code','Consolas',monospace;font-size:13px}
.amount.positive{color:#059669}
.amount.negative{color:#dc2626}
.status-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:500}
.status-completed{background:#d1fae5;color:#047857}
.status-pending{background:#fef3c7;color:#b45309}
.status-failed{background:#fee2e2;color:#b91c1c}
.status-refunded{background:#e0e7ff;color:#4338ca}
.type-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500}
.type-income{background:#d1fae5;color:#047857}
.type-expense{background:#fee2e2;color:#b91c1c}
.type-transfer{background:#dbeafe;color:#1d4ed8}
.crypto-addr{font-family:'SF Mono','Cascadia Code','Consolas',monospace;font-size:11px;color:var(--text-muted);max-width:100px;overflow:hidden;text-overflow:ellipsis}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border);font-size:13px;color:var(--text-muted)}
.pag-btns{display:flex;gap:4px}
.pag-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--text-muted);transition:all .15s}
.pag-btn:hover{background:var(--gold-light);border-color:var(--gold);color:var(--text)}
.pag-btn.active{background:var(--gold);color:#fff;border-color:var(--gold)}
.pag-btn:disabled{opacity:0.4;cursor:default}
/* Export Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--card-bg);border-radius:14px;width:420px;max-width:90vw;padding:0;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 0}
.modal-header h3{font-size:18px;font-weight:600}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--badge-bg);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted);font-size:18px}
.modal-body{padding:20px 24px}
.modal-body label{display:block;font-size:13px;font-weight:500;color:var(--text-muted);margin-bottom:6px}
.modal-body .form-group{margin-bottom:16px}
.radio-group{display:flex;gap:12px;flex-wrap:wrap}
.radio-group label{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:400;color:var(--text);cursor:pointer;margin-bottom:0}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;padding:0 24px 20px}
@media(max-width:768px){
  .sidebar{display:none}
  .stats{grid-template-columns:1fr}
  .filter-bar{flex-direction:column;align-items:stretch}
  .search-wrap{min-width:auto}
}
</style>
</head>

      {key:'asset',label:'Asset'},
      {key:'holdingQty',label:'Holding Qty'},
      {key:'unitPrice',label:'Unit Price'},
      {key:'holdingValue',label:'Holding Value'},
      {key:'lockMonths',label:'Lock (Months)'},
      {key:'tradeDate',label:'Trade Date'}
    ];
  }

  var headerHtml = '';
  for(var i=0;i<cols.length;i++) headerHtml += '<th>' + cols[i].label + '</th>';
  document.getElementById('tableHeader').innerHTML = headerHtml;

  var bodyHtml = '';
  for(var i=0;i<data.length;i++){
    var r = data[i];
    bodyHtml += '<tr>';
    for(var j=0;j<cols.length;j++){
      var k = cols[j].key;
      var val = r[k];
      if(k === 'id'){
        val = '<span class="tx-id">' + val + '</span>';
      } else if(k === 'amount'){
        var isNeg = val < 0;
        var amtSign = isNeg ? '' : '+';
        var amtClass = isNeg ? 'negative' : 'positive';
        if(currentTab === 'crypto' || currentTab === 'card'){
          val = '<span class="amount ' + amtClass + '">' + amtSign + '$' + formatMoney(Math.abs(val)) + '</span>';
        } else {
          val = '<span class="amount ' + amtClass + '">' + amtSign + '$' + formatMoney(Math.abs(val)) + '</span>';
        }
      } else if(k === 'fee'){
        val = '$' + formatMoney(val);
      } else if(k === 'type'){
        var t = val;
        if(t === 'deposit') t = 'Deposit';
        else if(t === 'withdraw') t = 'Withdraw';
        else if(t === 'income') t = 'Income';
        else if(t === 'expense') t = 'Expense';
        val = '<span class="type-badge type-' + (val==='deposit'||val==='income'?'income':'expense') + '">' + t + '</span>';
      } else if(k === 'status'){
        val = '<span class="status-badge status-' + val + '">' + val.charAt(0).toUpperCase() + val.slice(1) + '</span>';
      } else if(k === 'amount' || k === 'unitPrice' || k === 'holdingValue'){
        val = '$' + formatMoney(val);
      } else if(k === 'holdingQty'){
        val = formatMoney(val, val < 1 ? 4 : 2);
      } else if(k === 'lockMonths'){
        val = val > 0 ? val + ' months' : '-';
      }
      bodyHtml += '<td>' + (val||'') + '</td>';
    }
    bodyHtml += '</tr>';
  }
  document.getElementById('tableBody').innerHTML = bodyHtml;
  document.getElementById('totalCount').textContent = data.length;
}

function viewDetail(id){
  alert('Transaction: ' + id + '\nFull details would open in a side panel or detail page.');
}

function openExport(){
  document.getElementById('exportModal').classList.add('open');
}
function closeExport(){
  document.getElementById('exportModal').classList.remove('open');
}

renderTable();
</script>
