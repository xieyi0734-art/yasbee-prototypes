<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdrawal 2FA — YASBe</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Roboto,sans-serif;
  background:#191b1f;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:1000;
  backdrop-filter:blur(2px);
}

/* ===== Modal ===== */
.modal{
  background:#1b1d22;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;
  width:480px;
  max-width:92vw;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.modal-header{
  border-bottom:1px solid rgba(255,255,255,0.08);
  padding:24px 24px 16px;
}
.modal-header h2{
  font-size:20px;
  line-height:28px;
  font-weight:700;
  color:#ffffff;
}
.modal-body{
  flex:1;
  overflow-y:auto;
  padding:20px 24px;
}
.modal-footer{
  border-top:1px solid rgba(255,255,255,0.08);
  padding:16px 24px;
}
.modal-footer button{
  width:100%;
  height:48px;
  border:none;
  border-radius:8px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:all 0.15s ease;
  background:linear-gradient(92.29deg,#FFCA00 0%,#FE5707 100%);
  border:1px solid #FFDC8C;
  color:#ffffff;
}
.modal-footer button:hover{opacity:0.9}
.modal-footer button:disabled{opacity:0.7;cursor:not-allowed}

/* ===== Field ===== */
.field-row{
  margin-bottom:16px;
}
.field-label{
  display:block;
  font-size:13px;
  font-weight:500;
  color:rgba(255,255,255,0.45);
  margin-bottom:6px;
}
.field-value{
  font-size:15px;
  font-weight:500;
  color:#ffffff;
}

/* ===== Summary Card ===== */
.summary-card{
  background:#23262e;
  border-radius:10px;
  padding:16px;
  margin-bottom:20px;
}
.summary-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 0;
  font-size:14px;
}
.summary-row+.summary-row{
  border-top:1px solid rgba(255,255,255,0.08);
}
.summary-row .label{
  color:rgba(255,255,255,0.45);
}
.summary-row .value{
  color:rgba(255,255,255,0.8);
  font-weight:500;
}
.summary-row .value.gold{
  color:#FFCA00;
}
.summary-row .value.bold{
  color:#ffffff;
  font-weight:600;
}

/* ===== OTP ===== */
.otp-section-label{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:14px;
}
.otp-section-label span{
  font-size:14px;
  font-weight:600;
  color:#ffffff;
}
.otp-badge{
  display:inline-flex;
  align-items:center;
  gap:4px;
  font-size:11px;
  color:#34a853;
  background:rgba(52,168,83,0.12);
  padding:2px 8px;
  border-radius:4px;
  font-weight:500;
}
.input-grid{
  display:flex;
  gap:8px;
  justify-content:center;
  margin-bottom:8px;
}
.otp-box{
  width:46px;
  height:50px;
  background:#23262e;
  border:1.5px solid rgba(255,255,255,0.08);
  border-radius:8px;
  color:#ffffff;
  font-size:22px;
  font-weight:600;
  text-align:center;
  outline:none;
  caret-color:#FFCA00;
  transition:border-color 0.15s;
}
.otp-box:focus{
  border-color:#FFCA00;
}
.otp-sep{
  width:46px;height:50px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#4a4d56;
  font-size:18px;
}

/* ===== Error ===== */
.error-box{
  padding:10px 14px;
  background:rgba(234,67,53,0.1);
  border:1px solid rgba(234,67,53,0.25);
  border-radius:6px;
  font-size:13px;
  color:#ea4335;
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:12px;
}

/* ===== Checkbox ===== */
.checkbox-row{
  display:flex;
  align-items:flex-start;
  gap:10px;
  margin:16px 0 0;
}
.checkbox-row input[type="checkbox"]{
  appearance:none;
  width:18px;
  height:18px;
  min-width:18px;
  border:2px solid rgba(255,255,255,0.2);
  border-radius:4px;
  background:transparent;
  cursor:pointer;
  margin-top:2px;
  transition:all 0.15s;
  display:flex;
  align-items:center;
  justify-content:center;
}
.checkbox-row input[type="checkbox"]:checked{
  background:#FFCA00;
  border-color:#FFCA00;
  position:relative;
}
.checkbox-row input[type="checkbox"]:checked::after{
  content:'';
  display:block;
  width:5px;
  height:9px;
  border:solid #191b1f;
  border-width:0 2px 2px 0;
  transform:rotate(45deg);
  margin-top:-2px;
}
.checkbox-row label{
  font-size:13px;
  color:rgba(255,255,255,0.6);
  line-height:1.5;
  cursor:pointer;
}
.checkbox-row label a{
  color:#FFCA00;
  text-decoration:underline;
}
</style>
</head>
<body>

<div class="overlay">
  <div class="modal">

    <!-- Header -->
    <div class="modal-header">
      <h2>Withdrawal Amount</h2>
    </div>

    <!-- Body -->
    <div class="modal-body">

      <!-- Amount + Currency -->
      <div class="field-row">
        <span class="field-label">Withdrawal Amount</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="field-value">0.01</span>
          <span style="font-size:14px;color:rgba(255,255,255,0.45);font-weight:500">GSK</span>
        </div>
      </div>

      <!-- Balance info -->
      <div style="font-size:12px;color:rgba(255,255,255,0.35);margin-top:-8px;margin-bottom:16px">
        Min. withdrawal amount: USDT 5.00 · Available balance: 10.86 GSK
      </div>

      <!-- Fee Summary Card -->
      <div class="summary-card">
        <div class="summary-row">
          <span class="label">Withdrawal Amount</span>
          <span class="value bold">0.0100 GSK</span>
        </div>
        <div class="summary-row">
          <span class="label">Fee</span>
          <span class="value">2 GSK</span>
        </div>
        <div class="summary-row">
          <span class="label">Actual received</span>
          <span class="value gold">0.0000 GSK</span>
        </div>
      </div>

      <!-- TOTP -->
      <div style="margin-bottom:12px">
        <div class="otp-section-label">
           <span>2FA Verification Code</span>
          <span class="otp-badge">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
            Connected
          </span>
        </div>

        <div class="input-grid">
          <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autofocus oninput="otpInput(this)">
          <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" oninput="otpInput(this)">
          <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" oninput="otpInput(this)">
          <div class="otp-sep">—</div>
          <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" oninput="otpInput(this)">
          <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" oninput="otpInput(this)">
          <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" oninput="otpInput(this)">
        </div>

        <div style="text-align:center;margin-top:4px">
          <span style="font-size:12px;color:rgba(255,255,255,0.45)">Enter the 6-digit code from your authenticator app</span>
        </div>
      </div>

      <!-- Error (hidden by default) -->
      <div id="error" class="error-box" style="display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        <span>Invalid code. <span id="attempts">4</span> attempts remaining.</span>
      </div>

      <!-- Checkbox -->
      <div class="checkbox-row">
        <input type="checkbox" id="agree" checked>
        <label for="agree">I have read and agree to <a href="#">YASBe Declaration</a></label>
      </div>

    </div>

    <!-- Footer -->
    <div class="modal-footer">
      <button>Submit</button>
    </div>

  </div>
</div>

<script>
function otpInput(el){
  el.value = el.value.replace(/[^0-9]/g,'');
  if(el.value){
    let next = el.nextElementSibling;
    // skip separator divs
    while(next && next.tagName!=='INPUT') next = next.nextElementSibling;
    if(next && next.tagName==='INPUT') next.focus();
    else setTimeout(function(){el.blur();},50);
  }
}

// Demo: show error after 7 seconds
setTimeout(function(){
  document.getElementById('error').style.display = 'flex';
}, 7000);
</script>

</body>
</html>
